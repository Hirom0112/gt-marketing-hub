# params/params.yaml — every magic number lives here. Cited as ARCHITECTURE.md §8.

work_queue:                 # FR-2.5 — score = w_recoverability·recoverability + w_value·value + w_deadline·deadline_proximity
  w_recoverability: 0.6
  w_value: 0.4
  w_deadline: 1.0           # R2 — weight on deadline-proximity (0 unless at-risk near a voucher deadline). TUNABLE: at 1.0 an at-risk family at the deadline (proximity→1) outranks ANY non-urgent family (whose base maxes at w_recoverability+w_value=1.0), so the award-about-to-lapse cases sort to the top in the demo. Lower it to make deadline pressure merely a strong tiebreaker rather than dominant.
  deadline_horizon_days: 14 # R2 — proximity rises from 0 (≥ this many days out) to 1.0 (deadline today/past); the urgency window for an unreconfirmed award.
  recoverability:           # sub-factors, each normalized to [0,1]
    stall_recency_weight: 0.3
    stage_proximity_weight: 0.5     # funnel depth DOMINATES — the further they went, the more recoverable (A-23)
    responsiveness_weight: 0.2
    responsiveness_email_opens_max: 40   # email_opens normalizer (A-5); §4.5 aggregate cap
  value:
    tuition_annual_default: 10400   # per-child GT-Anywhere tuition $/yr (PROJECT.md §2); voucher = self-pay (A-23)
    max_children: 5                 # Interest form "How many children? 1-5+" cap — value_max normalizer (A-23)
  stall_window_days: 14             # stalled_since older than this ⇒ flagged (§5.1)
  freshness_window_days: 30         # S12 — recoverable_now freshness decays to floor over this window
  freshness_floor: 0.15             # S12 — minimum freshness once past the window (never 0 ⇒ stays rankable)

conversion:                 # DH-1 — deterministic conversion-likelihood signal (replaces the "MAP signal" in the deal view): who is most likely to enroll + the top contributing factor. score = Σ weight·dimension, each dimension ∈ [0,1] ⇒ score ∈ [0,1].
  weights:                  # the five dimension weights — MUST sum to 1.0 (value-term partition guard, INV-11)
    affluence: 0.25           # neighborhood affluence (richer area ⇒ more likely to afford tuition) — aggregate area LABEL only (P-4/INV-6)
    income: 0.25              # self-reported family income (higher ⇒ higher) — co-leads with affluence: ability-to-pay is the strongest "use it to close" lever
    children: 0.10            # number of children (more ⇒ more commitment/value)
    funding: 0.20             # funding type (a funded voucher path ⇒ money lined up ⇒ likelier to close)
    depth: 0.20               # application depth — the REUSED recoverability term (funnel depth), NOT a new funnel score
  band_high_cutoff: 0.65    # score >= this ⇒ "High"
  band_med_cutoff: 0.45     # score >= this (and < high) ⇒ "Med"; else "Low"
  neighborhood_affluence:   # coarse AGGREGATE area label → [0,1] affluence (P-4/INV-6: a district label, NEVER precise minor geo)
    Highland Park: 0.95       # affluent district (HIGH)
    Riverside: 0.60           # middle district (MED)
    Lakeview: 0.60            # mixed district (MED)
    Eastgate: 0.30            # modest district (LOW)
  neighborhood_affluence_default: 0.50   # affluence for an UNKNOWN/unmapped label (neutral, not penalized)
  income_reference: 200000  # self-reported income (whole USD) that maps to ~1.0; income/reference clamped to [0,1]
  income_neutral: 0.50      # the NEUTRAL [0,1] income contribution when income is None (UNKNOWN — never treated as low/zero)
  num_children_cap: 5       # child count mapping to 1.0; num_children/cap clamped to [0,1] (mirrors the Interest form "1-5+")
  funding_affinity:         # funding-type token → [0,1] close affinity (money lined up ⇒ likelier to close)
    tefa_standard: 0.90       # funded standard voucher
    tefa_disability: 0.90     # funded disability-IEP voucher
    tefa_homeschool: 0.70     # funded homeschool voucher (smaller award)
    self_pay: 0.50            # no voucher — pays directly
  funding_affinity_default: 0.50   # affinity for an unknown / None funding type (neutral)

enrollment:                 # S9 — enrollment-depth deterministic core
  contact:                  # contact-recency color thresholds (S9 W1); age measured from created_at
    grey_window_days: 3       # uncontacted & age <= this  => fresh (grey)
    overdue_days: 4           # uncontacted & age >= this  => overdue (red)

assignment:                 # M2 — owner-authority assignment split + routing/alarm tunables (MULTI_AGENT_COCKPIT §2.2, §4)
  closer_rank_max: 1          # §2.2 — 'closer' is a TIER not a role; agents at rank <= this are the closer tier (demo = 1)
  high_value_threshold: 12000.0   # annual-tuition $ at/above which a family routes as HIGH VALUE (a $ figure, not a [0,1] score)
  high_likelihood_threshold: 0.6  # recoverability/likelihood in [0,1] at/above which a family routes as HIGH LIKELIHOOD
  deadline_alarm_days: 14     # within this many days of a voucher deadline ⇒ deadline alarm
  unowned_alarm_days: 3       # an UNOWNED family older than this many days ⇒ unowned alarm
  per_tier_load_cap: 40       # max open families one agent tier may hold before auto-assign stops (load governance)

sis:                        # M5 — seam reconcile bucket rules (MULTI_AGENT_COCKPIT §6); thresholds are tunables, not hardcoded
  match_confidence_cutoff: 0.9        # below this normalized GT↔SIS match score ⇒ ambiguous → merge queue
  confirmed_min_confidence: 0.9       # at/above this ⇒ CONFIRMED (reconciled on both sides)
  paid_not_in_sis_max_confidence: 0.5 # a GT-paid family whose best SIS match is at/below this ⇒ PAID-NOT-IN-SIS
  records_lag_days: 7                 # confirmed-paid but absent from SIS export this many days past payment ⇒ RECORDS-LAG
  phone_only_confidence: 0.6          # score a phone-only match earns (in the ambiguous band 0.5–0.9 ⇒ merge queue)

bulk:                       # S12 W2 — bulk action governance (A-20; INV-8 per-run cap)
  nudge_per_run_cap: 50       # max families that may SEND per bulk-nudge run; beyond ⇒ capped/deferred

back_to_school:             # S12 W2 — the SEPARATE deterministic volume cohort (A-21; INV-1/INV-11)
  count: 348                  # ~active stalls in the back-to-school surge (mock v2 shape)
  seed: 2024                  # the cohort's own RNG seed (isolated from the default June stream)
  spike_year: 2026            # surge anchor near the demo "now" (_EPOCH 2026-06-15)
  spike_month: 6              # June (the surge "just happened" → the spike day reads FRESH)
  spike_day: 13               # the single-day spike (the mock's ~184-in-one-day shape), 2d before now
  spike_share: 0.53           # fraction of the cohort whose stall_date lands on the spike day
  spread_days: 40             # off-spike families spread BACKWARD this many days (the overdue tail)

realistic:                  # the SEPARATE deterministic cohort calibrated to GT's real inquiry cadence (INV-1/INV-11)
  total: 5146                 # measured inquiries 2026-01-23 → 2026-06-13 (~36/day), aggregate-only
  seed: 5146                  # the cohort's own RNG seed (isolated from the default + back_to_school streams)
  window_start_year: 2026     # inquiry window lower bound (inclusive)
  window_start_month: 1
  window_start_day: 23
  window_end_year: 2026       # inquiry window upper bound (inclusive)
  window_end_month: 6
  window_end_day: 13
  monthly_counts:             # the measured monthly shape; sum MUST equal total
    "2026-01": 1203           # Jan — incl. the 2026-01-27 campaign spike
    "2026-02": 1324           # Feb — peak month, two mild secondary bumps
    "2026-03": 1302           # Mar — season peak
    "2026-04": 832            # Apr — tapering
    "2026-05": 462            # May — into summer
    "2026-06": 23             # Jun — partial month, ends 06-13
  spike_year: 2026            # the ONE campaign-burst day
  spike_month: 1
  spike_day: 27
  spike_count: 761            # inquiries landing on the campaign day (the single busiest created-day)
  secondary_bumps:            # mild within-month bumps (extra inquiries concentrated on a single day)
    - { year: 2026, month: 2, day: 12, count: 188 }
    - { year: 2026, month: 2, day: 15, count: 132 }
  active_count: 140           # recent UNRESOLVED stalls → the ACTIVE recovery board (a fraction of 36/day)
  active_window_days: 35      # active families' stalled_since spread across the last N days from the demo now
  dismissed_count: 22         # active-shaped families set aside via a logged dismiss event (History non-empty)

funding:                    # FR-2.7 — RESEARCH.md Q1; amounts NEVER hardcoded elsewhere
  award_amounts:
    tefa_standard: 10474            # $/yr standard private-school student
    tefa_disability: 30000          # up to $30,000/yr disability-IEP
    tefa_homeschool: 2000           # up to $2,000/yr homeschool/other
  installment_split: [0.25, 0.25, 0.50]   # ~Jul1 / Oct1 / Feb1
  tuition_unlock_state: first_installment_received   # §5.4 gate threshold

voucher_programs:           # R2 — per-program RULES + DEADLINES; a new state is a CONFIG ROW, not code (INV-11).
  # Owns ONLY the new window/rule values; award AMOUNTS keep their canonical home in `funding` above.
  # Each rule carries verified/confidence so an UNVERIFIED rule is VISIBLE, never silently load-bearing.
  tx_tefa:                  # Texas Education Freedom Accounts (TEFA / SB-2 2025) — ANALYSIS/tefa-mechanics-and-timing.md
    program_name: "Texas Education Freedom Accounts"
    funding_year: 2026
    windows:
      parent_select_deadline: 2026-07-15   # CONFIRMED — final parent deadline to select/confirm a school (reconfirm step)
      full_award_cutoff: 2026-09-15        # CONFIRMED official — last date a confirmation still earns the FULL award; after ⇒ prorated
      reconfirm_required: true             # CONFIRMED — the SELECTED_GT → RECONFIRMED parent lock-in gap exists
      verified: true                       # the deadline dates are confirmed against the official funding page
      confidence: confirmed                # provenance: educationfreedom.texas.gov Funding Timelines & Installments
    installment_schedule:                  # DATA, not a comment: fraction + due month/day (≈ Jul 1 / Oct 1 / Feb 1)
      - { fraction: 0.25, due_month: 7, due_day: 1 }
      - { fraction: 0.25, due_month: 10, due_day: 1 }
      - { fraction: 0.50, due_month: 2, due_day: 1 }
    setting_lock:
      irreversible_settings: [homeschool, other]   # CONFIRMED — homeschool/other is final and cannot upgrade to the private rate
      verified: true
      confidence: confirmed
    tuition_unlock_state: first_installment_received   # composes funding_gate (§5.4 threshold); mirrors `funding`
  az_esa:                   # Arizona Empowerment Scholarship Account — SECOND program proving multi-state = config row.
    # NOTE: AZ ESA window dates are NOT in the ANALYSIS docs (those cover TX only). These are UNVERIFIED
    # placeholders flagged so they are never silently load-bearing — confirm against the AZ DOE before live use.
    program_name: "Arizona Empowerment Scholarship Account"
    funding_year: 2026
    windows:
      parent_select_deadline: 2026-08-01   # UNVERIFIED placeholder — not sourced; AZ ESA enrolls year-round (verify)
      full_award_cutoff: 2026-09-30        # UNVERIFIED placeholder — prorating/cutoff behavior unconfirmed for AZ
      reconfirm_required: false            # UNVERIFIED — AZ ESA has no documented GT reconfirm gap (modeled as absent)
      verified: false                      # flagged UNVERIFIED so the rule surfaces as not-yet-confirmed
      confidence: unverified               # provenance: NONE in repo ANALYSIS — placeholder only
    installment_schedule:                  # UNVERIFIED placeholder split (mirrors the funding split shape for demo)
      - { fraction: 0.25, due_month: 8, due_day: 1 }
      - { fraction: 0.25, due_month: 11, due_day: 1 }
      - { fraction: 0.50, due_month: 2, due_day: 1 }
    setting_lock:
      irreversible_settings: []            # UNVERIFIED — no documented irreversible-setting rule for AZ in repo sources
      verified: false
      confidence: unverified
    tuition_unlock_state: first_installment_received

eval_thresholds:            # FR-4.x — an action whose eval is below threshold is BLOCKED/disabled
  nudge_trigger:            # FR-4.1
    min_precision: 0.85
    min_recall: 0.70
  doc_extraction:           # FR-4.2
    min_accuracy: 0.90
  message_safety_grounding: # FR-4.3 — gates §5.2 and §5.3; failing message blocked, not softened
    min_grounding: 0.95     # V-2 grounding floor — unverifiable "4X/2X" claims must be BLOCKED (never lowered)
    min_brand_score: 0.80   # V-4 brand-voice bar ONLY — distinct from the V-2 grounding floor; the LLM brand judge scores genuinely on-brand copy ~0.85, so reusing 0.95 wrongly blocked it
    max_unverifiable_claims: 0
    require_coppa_safe: true
  close_tips:               # S9 W5 — "how to close" tips grounded in app_form.extracted_fields
    min_grounding: 0.95     # golden-set accuracy floor; a hallucinated fact must be BLOCKED (V-2)
    max_unverifiable_claims: 0
    require_coppa_safe: true
  geo_tracking:             # FR-4.4 — repeated sampling, variance reported
    min_samples_per_prompt: 5
    report_variance: true

cost_caps:                  # NFR-5 — hard per-run cap; exceeding ⇒ deterministic/placeholder (§9)
  anthropic_per_run_usd: 5.00       # detailed cost model in TECH_STACK.md §Cost
  media_gen_per_run_usd: 0.00       # OUT-1 placeholder in v1

anthropic_pricing:          # TECH_STACK.md §6.1 — canonical per-MTok rates; usd = (in*in_rate + out*out_rate)/1e6
  models:                           # keyed by model id (matches ANTHROPIC_MODEL_* in §5.3)
    claude-opus-4-8:                # Primary (Opus)
      input_per_mtok: 5.00
      output_per_mtok: 25.00
    claude-sonnet-4-6:              # Fast (Sonnet)
      input_per_mtok: 3.00
      output_per_mtok: 15.00
    claude-haiku-4-5-20251001:      # Cheap (Haiku)
      input_per_mtok: 1.00
      output_per_mtok: 5.00

latency_budget_ms:          # NFR-9
  ai_proposal: 8000

geo:                        # FR-3.7 / RESEARCH.md Q5
  prompt_set_size: 30
  cadence: weekly
  baseline_coverage: 0.0            # the 0% baseline GT starts from
  # generate-to-win flywheel (FR-3.7): once a GEO piece is published for a prompt,
  # the simulated engine cites GT for that prompt far more often — coverage RISES.
  # Expressed as the GT cite-likelihood buckets (out of 256) for a PUBLISHED prompt;
  # the unpublished baseline is ~8/256 (~3%). 200/256 (~78%) makes the lift visible.
  # NOT live behaviour (no live engine in v1, INV-9) — it shapes the simulation only.
  published_cite_buckets: 200       # GT cite buckets (of 256) once a prompt is won

brand_memory:               # FR-3.2 / CONTENT_SPEC §8.3.2 — the keep/discard learning loop
  weight_step: 1.0                  # affirm (+) / discard (-) conditioning weight delta (INV-11)

library_ingest:             # Phase-1 marketing — distilled scraper-library seed (GT's own proven content)
  top_n_per_theme: 3                # max exemplars kept per INSIGHTS theme (keeps the seed small + deterministic)
  normalization:            # per-platform engagement caps → comparable [0,1] weight (X views ≠ IG likes)
    instagram_likes_max: 200        # IG/FB/TikTok carry `likes`; X/YouTube carry `views_plays`
    facebook_likes_max: 200
    tiktok_likes_max: 200
    x_views_max: 130000             # X tops out ~131K views on the strongest post
    youtube_views_max: 50000        # YouTube view ceiling for normalization

posted_gallery:             # FR-3.4 — posted-content gallery: per-post value + a deterministic posted_at
  # No per-post engagement feed is tracked yet (a real feed is a future wire-up), so each
  # post carries a DETERMINISTIC SYNTHETIC value: a stable hash of the asset id mapped into
  # [value_min, value_max]. Same posture as the work-queue value-variance pattern — placeholder,
  # not a real metric. The range is params-homed so it is never a code literal (INV-11).
  value_min: 1.0                    # floor of the synthetic value band (most_valuable sort key)
  value_max: 100.0                  # ceiling of the synthetic value band
  # The import provenance ts is fixed, so posted_at is also a deterministic synthetic placeholder:
  # a stable hash backdates each post into the [1, posted_within_days] window before the import epoch,
  # giving the "most recent" sort a believable spread without a real publish-time feed.
  posted_within_days: 365           # widest backdate from the import epoch for the synthetic posted_at
  # REAL-catalog path (the scoped INV-1 exception, ASSUMPTIONS): when GT_POSTED_CATALOG_ROOT is set,
  # a post's value is a REAL engagement composite — like_weight*likes + view_weight*views +
  # comment_weight*comments. A comment is a far stronger signal than a passive view, so the
  # weights are asymmetric. Params-homed so the ranking formula is never a code literal (INV-11).
  engagement:
    like_weight: 1.0                # weight on likes (the baseline engagement unit)
    view_weight: 0.1               # weight on views/plays (cheap, passive — discounted)
    comment_weight: 3.0            # weight on comments (the strongest signal)

creator_scoring:            # FR-3.8 / CONTENT_SPEC §8.1 — creator-discovery fit + authenticity
  fit:                      # sub-weights over [0,1] sub-factors; MUST sum to 1.0
    topic_match_weight: 0.5
    audience_match_weight: 0.3
    brand_alignment_weight: 0.2
  authenticity:             # sub-weights over [0,1] sub-factors; MUST sum to 1.0
    follower_authenticity_weight: 0.5
    engagement_consistency_weight: 0.3
    spam_signal_weight: 0.2           # higher spam signal LOWERS authenticity (consumer applies as penalty)
  surface_threshold: 0.6            # min fit score for a creator to surface in the discovery list

kpi:                        # FR-3.11 — per-channel KPI rollup vs baseline/target
  levers:                   # per-channel baseline (current) + target; lever delta = metric - baseline
    instagram: { baseline: 0.0, target: 0.05 }
    tiktok:    { baseline: 0.0, target: 0.05 }
    x:         { baseline: 0.0, target: 0.04 }
    linkedin:  { baseline: 0.0, target: 0.03 }
    email:     { baseline: 0.0, target: 0.10 }
    blog:      { baseline: 0.0, target: 0.06 }
    landing_page: { baseline: 0.0, target: 0.08 }
    geo:       { baseline: 0.0, target: 0.02 }

scheduler:                  # FR-3.6 / OUT-2 — dispatch is SIMULATED in v1
  dispatch_mode: simulated          # never 'live' in v1 (INV-9, OUT-2)
  # publish-monitor fan-out: a publish request targets a subset of these channels.
  # Subset of the LOCKED Channel enum (CONTENT_SPEC §2.1) — social-publishable feeds
  # only. FB/YT/Threads/Pinterest are NOT in the enum (adding them is a spec change).
  publish_channels: [instagram, tiktok, x, linkedin]
  daily_caps:                       # per-platform max SIMULATED dispatches/day; over-cap ⇒ blocked (INV-8 posture)
    instagram: 5
    tiktok: 3
    x: 10
    linkedin: 3

crm:                        # S10 — HubSpot CRM seam (ANALYSIS/hubspot-complement-plan.md)
  # Cockpit Stage enum value → HubSpot deal stage id. Provisioned by
  # scripts/provision_hubspot.py against the live portal; the adapter reads ids
  # from params, never hardcodes them (INV-11). Example ids shown for shape.
  stage_map:
    interest: "3840835272"
    apply: "3840835273"
    enroll: "3840835274"
    tuition: "3840835275"
    closed_lost: "closedlost"
  # Synthetic write-lock allowlist (guard 1, INV-1) — only synthetic crosses.
  # The .test/.invalid markers are the in-repo synthetic shape (HubSpot rejects
  # those reserved TLDs as invalid emails); gtschool-synthetic.com is a valid-TLD
  # but unmistakably-synthetic domain so the LIVE adapter can actually write a
  # Contact (it is NOT a real GT/vendor domain — see real_domain_denylist).
  synthetic_email_domains:
    - example.test
    - example.invalid
    - synthetic.gtschool.test
    - gtschool-synthetic.com
  # Real domains the write-lock denies (defense in depth atop the allowlist).
  real_domain_denylist:
    - gauntlethq.com
    - trilogy.com
    - modal.com
    - humanlayer.dev
    - foxhomesteam.com
    - lge.com
    - outlier.ai
  # gt_* custom HubSpot property internal names provisioned by the script.
  gt_properties:
    deal:
      - gt_synthetic_id
      - gt_funding_state
      - gt_stall_reason
      - gt_priority
      - gt_forms_signed
      - gt_apply_date
    contact:
      - gt_synthetic_id
    # GT Social Post custom-object props (publish-monitor W3): the second-screen
    # mirror of each dispatched social post. Provisioned by the script.
    social_post:
      - gt_synthetic_id        # idempotency key = str(post_id) (NEVER PII; INV-1)
      - gt_platform            # the dispatch channel (instagram/x/...)
      - gt_dispatch_status     # the §6 dispatch verdict (simulated_sent/...)
      - gt_scheduled_for       # the scheduled-for marker
      - gt_campaign_theme      # the publish request's campaign theme
      - gt_content_ref         # source content ref (asset/candidate id)
      - gt_simulated_receipt   # the simulated dispatch receipt
  # The GT Social Post custom object (publish-monitor W3). object_type is the
  # CRM v3 path id; placeholder shape — re-provision to fill it on a real portal.
  gt_social_post_object:
    object_type: "p_gt_social_post"
    id_property: gt_synthetic_id

security:                   # M7 — detection thresholds for the edge middleware (MULTI_AGENT_COCKPIT §7; INV-11). DETECTION, not inline blocking.
  oversized_result_rows: 200        # a list response at/above this many rows ⇒ oversized_result (API4:2023 Unrestricted Resource Consumption)
  auth_failure_burst: 5             # at/above this many 401/403 from one actor within the window ⇒ auth_failure_burst (A07:2021 Identification & Auth Failures)
  auth_failure_window_seconds: 60   # rolling window (seconds) over which the auth-failure burst is counted
